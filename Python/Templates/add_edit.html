{% extends "base.html" %}

{% block content %}
<h2>{{ title }}</h2>
<form method="POST">
    <div class="mb-3">
        <label>Имя сотрудника</label>
        <input type="text" name="employee_name" class="form-control" value="{{ record.employee_name if record else '' }}" required>
    </div>
    <div class="mb-3">
        <label>Дата </label>
        <input type="date" name="date" class="form-control" value="{{ record.date if record else '' }}" required>
    </div>
    <div class="mb-3">
        <label>Часы</label>
        <input type="number" step="0.5" name="hours" class="form-control" value="{{ record.hours if record else '' }}" required>
    </div>
    <div class="mb-3">
        <label>Название проекта</label>
        <input type="text" name="project_name" class="form-control" value="{{ record.project_name if record else '' }}" required>
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="/" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
